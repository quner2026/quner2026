name: Update README cards
on:
  schedule:
    - cron: "0 0 * * *" # 每天运行一次更新数据
  workflow_dispatch: # 允许你在网页上随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须要有写入权限，Action 才能把生成的图片存进你的仓库

    steps:
      - uses: actions/checkout@v4

      # 1. 整体统计卡片 (开启私有仓库统计)
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # 使用 JSON 格式，精准传递 count_private: true
          options: '{"username":"quner2026","show_icons":true,"theme":"radical","count_private":true}'
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      # 2. 常用语言卡片 (剔除 HTML 和 Jupyter Notebook)
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # JSON 格式下直接打空格，注意大小写匹配
          options: '{"username":"quner2026","show_icons":true,"layout":"compact","theme":"radical","hide":"html,Jupyter Notebook"}'
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "修复参数失效问题" || exit 0
          git push
